services:
  db-profile:
    image: postgres:16
    container_name: postgres-db-management-profile
    ports:
      - ${POSTGRESQL_PROFILE_PORT_EXPOSE}:${POSTGRESQL_PROFILE_PORT_INTER}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRESQL_PROFILE_P}
      POSTGRES_PASSWORD: ${POSTGRESQL_PROFILE_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_PROFILE_DB}
    volumes:
      - ${POSTGRESQL_PROFILE_VOLUMEN_DATA_SAVE}
  db-logs:
    image: mongo
    restart: unless-stopped
    ports:
      - ${MONGO_DOCKER_EXPOSE_PORT}:${MONGO_PORT_DOCKER}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${USERNAME_MONGO}
      MONGO_INITDB_ROOT_PASSWORD: ${PASSWORD_USERNAME_MONGO}
      MONGO_INITDB_DATABASE: ${DATABASE_NAME_MONGO}
    volumes:
      - ${VOLUME_STORE_DATA}
  db-e:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT_EXPOSE}:${POSTGRES_PORT_DOCKER}
    volumes:
      - ${POSTGRES_VOLUMEN_DATA_SAVE}
      - ${POSTGRES_VOLUMEN_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-d:
    image: mysql:9.6.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - ${MYSQL_PORT_EXPOSE}:${MYSQL_PORT}
    volumes:
      - ${VOLUMES_DB_SAVE}
      - ${VOLUME_CREATE_DATABASES}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 4s
      timeout: 9s
      retries: 10

  service-departments:
    depends_on:
      db-d:
        condition: service_healthy
    build: ./department_backend/
    env_file:
      - .env
    restart: on-failure
    ports:
      - ${PORT_EXPOSE_SERVICE_DEPARTMENTS}:${PORT_DOCKER}
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DBNET: ${MYSQL_DBNET}
      PORT_LISTEN: ${PORT_DOCKER}
      MYSQL_DBADDR: db-d:${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

  service-employees:
    depends_on:
      db-e:
        condition: service_healthy
      service-rabbitmq:
        condition: service_healthy
    build: ./employee-backend/
    env_file:
      - .env
    restart: on-failure
    ports:
      - ${PORT_SE_EXPOSE}:${PORT_SE_DOCKER}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_DRIVE: ${SERVER_DRIVE}
      DDL_AUTO: ${DDL_AUTO}
      HIBERNATE_DIALECT: ${HIBERNATE_DIALECT}
      DB_URI: db-e
      PORT: ${POSTGRES_PORT_DOCKER}
      NAME_DATABASE: ${POSTGRES_DB}
      RABBIT_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBIT_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBIT_PORT: ${PORTS_CLIENT_RABBIT_DOCKER}
      RABBIT_HOST: service-rabbitmq
      NAME_QUEUE: ${NAME_QUEUE}
      EVENT_ONE: ${EVENT_ONE}
      EVENT_TWO: ${EVENT_TWO}
      DIRECT_EXCHANGE: ${EXCHANGE_RABBIT}
      URI_SERVICE_D: http://service-departments:${PORT_DOCKER}

  service-rabbitmq:
    env_file:
      - .env
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - ${PORTS_CLIENT_RABBIT_EXPOSE}:${PORTS_CLIENT_RABBIT_DOCKER}
      - ${PORTS_INTERFACE_RABBIT_EXPOSE}:${PORTS_INTERFACE_RABBIT_DOCKER}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      start_period: 4s
      retries: 3

  service-logs:
    env_file:
      - .env
    build:
      context: ./microservice-logs/
      dockerfile: Dockerfile
    ports:
      - 8085:8080
    environment:
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_ADDRESS: service-rabbitmq
      RABBITMQ_PORT: ${PORTS_CLIENT_RABBIT_DOCKER}
      EXCHANGE_RABBIT: ${EXCHANGE_RABBIT}
      EVENT_ONE: ${EVENT_ONE}
      EVENT_TWO: ${EVENT_TWO}
      RABBITMQ_HOST: db-logs
      RABBITMQ_NAME: ${NAME_QUEUE}
      MONGO_INITDB_ROOT_USERNAME: ${USERNAME_MONGO}
      MONGO_INITDB_ROOT_PASSWORD: ${PASSWORD_USERNAME_MONGO}
      MONGO_INITDB_DATABASE: ${DATABASE_NAME_MONGO}
    depends_on:
      service-rabbitmq:
        condition: service_healthy

  service-profile:
    env_file:
      - .env
    build:
      context: ./management_profile/
      dockerfile: Dockerfile
    ports:
      - ${SERVICE_PROFILE_PORT_EXPOSE}:${SERVICE_PROFILE_PORT_INTERN}
    environment:
      - DB_CONNECTION_STRING=Host=postgres;Database=profiles_db;Username=user_db;Password=1234
    depends_on:
      - db-profile

volumes:
  postgres-data:
  mysql-data:
  db-logs:
  postgres_data:
