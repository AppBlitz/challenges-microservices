spring:
  application:
    name: employee_microservice
  datasource:
    url: jdbc:postgresql://${DB_URI}:${PORT}/${NAME_DATABASE}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: ${SERVER_DRIVE} 

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO}
    show-sql: true
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT}
  
  rabbitmq:
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    name_queue: ${NAME_QUEUE}
    event_one : ${EVENT_ONE}
    event_two: ${EVENT_TWO}
    direct_exchange: ${DIRECT_EXCHANGE}

cors:
  hostOne: ${ORIGINONE}
  hostTwo: ${ORIGINTWO}
  hostThree: ${ORIGINTHREE}
